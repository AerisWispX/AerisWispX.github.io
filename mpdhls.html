<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<title>HelloSports Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>

*,*::before,*::after{
box-sizing:border-box;
margin:0;
padding:0
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:sans-serif
}

#player-wrap{
position:relative;
width:100%;
height:100%
}

#shaka-container{
width:100%;
height:100%;
background:#000
}

#shaka-container video{
width:100%;
height:100%;
background:#000
}

/* watermark */

.wm{
position:absolute;
top:10px;
left:10px;
z-index:9999
}

.wm a{
display:inline-flex;
align-items:center;
gap:6px;
background:#D50000;
color:#fff;
padding:5px 11px;
font-size:13px;
font-weight:700;
border-radius:5px;
text-decoration:none;
letter-spacing:.3px;
animation:pulse 2.5s infinite ease-in-out;
box-shadow:0 2px 8px rgba(213,0,0,.5)
}

.wm a:hover{
background:#FF1744
}

.wm svg{
width:14px;
height:14px;
fill:#fff
}

@keyframes pulse{
0%,100%{opacity:1;transform:scale(1)}
50%{opacity:.75;transform:scale(.97)}
}

/* loader */

#loader{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
z-index:10
}

.spinner{
width:44px;
height:44px;
border:4px solid rgba(255,255,255,.15);
border-top-color:#D50000;
border-radius:50%;
animation:spin .8s linear infinite
}

@keyframes spin{
to{transform:rotate(360deg)}
}

</style>
</head>

<body>

<div id="player-wrap">

<div id="loader">
<div class="spinner"></div>
</div>

<div class="wm">
<a href="https://www.hellosports.live" target="_blank">
<svg viewBox="0 0 24 24">
<path d="M8 5v14l11-7z"/>
</svg>
HelloSports.live
</a>
</div>

<div id="shaka-container" data-shaka-player-container>
<video id="video" data-shaka-player autoplay playsinline crossorigin="anonymous"></video>
</div>

</div>

<script>

function param(name){
return new URL(location.href).searchParams.get(name)||""
}

function safeAtob(str){
try{return atob(str)}catch(e){return str}
}

const get=param("get")
const streamUrl=get?safeAtob(get):param("file")

const loader=document.getElementById("loader")

if(!streamUrl){
alert("No stream URL provided")
throw "no stream"
}

shaka.polyfill.installAll()

async function init(){

if(!shaka.Player.isBrowserSupported()){
alert("Browser not supported")
return
}

const video=document.getElementById("video")
const ui=video.ui
const controls=ui.getControls()
const player=controls.getPlayer()

window.player=player

ui.configure({

controlPanelElements:[
"play_pause",
"mute",
"volume",
"spacer",
"quality",
"picture_in_picture",
"fullscreen"
],

addSeekBar:true,

seekBarColors:{
base:"rgba(255,255,255,.3)",
played:"rgba(213,0,0,.9)"
}

})

player.configure({

streaming:{
lowLatencyMode:true,
bufferingGoal:15,
rebufferingGoal:2
}

})

player.getNetworkingEngine().registerRequestFilter((type,request)=>{

request.headers["Referer"]=location.href
request.headers["Origin"]=location.origin

})

player.addEventListener("error",e=>{
console.error("Shaka Error",e.detail)
})

try{

await player.load(streamUrl)

loader.style.display="none"

video.play().catch(()=>{})

}catch(e){

console.error(e)
alert("Stream failed to load")

}

}

document.addEventListener("DOMContentLoaded",init)

</script>

</body>
</html>
